# ──────────────────────────────────────────────────────────────
# TODO Check Workflow
# ──────────────────────────────────────────────────────────────
# Runs scripts/check_todos.py on PRs to report remaining
# "TODO (template users)" markers.  After forking this template,
# many files contain these markers to guide customization.  This
# workflow warns when a PR introduces new markers or when existing
# ones haven't been addressed yet.
#
# Exit codes: 0 = no TODOs found, 1 = TODOs remain.
# The workflow is non-blocking (uses continue-on-error) so it
# doesn't prevent merging — it just provides visibility.
#
# Triggers:
#   - Pull requests targeting main
#   - Push to main (catch new TODOs that land)
#   - Manual dispatch
#
# TODO (template users):
#   1. Enable the repository guard (pick ONE):
#        Option A – Replace 'YOURNAME/YOURREPO' below with
#                   your actual repo slug (e.g. 'myorg/myproject').
#        Option B – Set a repository variable (no YAML edits needed):
#                     vars.ENABLE_TODO_CHECK = 'true'
#                   (Settings → Secrets and variables → Actions → Variables)
#   2. Once you've completed all template customization, this workflow
#      will exit 0 and effectively become a no-op.  You can then either
#      delete it or repurpose it to scan for your own TODO patterns.
# ──────────────────────────────────────────────────────────────

name: TODO Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  todo-check:
    name: Check template TODOs

    # ── Repository guard ──────────────────────────────────────
    # Prevents this workflow from running on forks or clones
    # that haven't opted in.
    #
    #   Option A  – Edit the hardcoded slug below.
    #   Option B  – Set vars.ENABLE_TODO_CHECK = 'true'.
    if: >-
      ${{
        github.repository == 'YOURNAME/YOURREPO'
        || vars.ENABLE_WORKFLOWS == 'true'
        || vars.ENABLE_TODO_CHECK == 'true'
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # Checkout a Git repository at a particular version (v6.0.2)
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # Set up a specific version of Python and add… (v6.2.0)
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Scan for TODO markers
        # Non-blocking: exit code 1 means TODOs remain, but we don't
        # want to fail the entire CI pipeline over template markers.
        continue-on-error: true
        run: python scripts/check_todos.py

      - name: Summary (count only)
        # Always run to provide a quick count in the job summary, even
        # if the previous step "failed" (exit 1 = TODOs remain).
        if: always()
        run: |
          echo "## TODO Check Summary" >> "$GITHUB_STEP_SUMMARY"
          python scripts/check_todos.py --count >> "$GITHUB_STEP_SUMMARY" 2>&1 || true
