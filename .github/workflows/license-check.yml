# ──────────────────────────────────────────────────────────────
# License Check Workflow
# ──────────────────────────────────────────────────────────────
# Verifies that all installed Python dependency licenses are
# compatible with the project's license (Apache 2.0 by default).
#
# Uses pip-licenses to enumerate dependency licenses and checks
# them against an allow-list.  Fails if any dependency uses a
# license not in the allowed set — useful for projects with
# strict license policies (e.g., no GPL deps in an Apache project).
#
# ── Why license compatibility matters ─────────────────────────
# Software licenses are legally binding.  If your project uses
# a permissive license (MIT, Apache 2.0, BSD) but depends on a
# library with a copyleft license (GPL, AGPL), the copyleft
# terms can "infect" your distribution — anyone who distributes
# your project (as a binary, container image, or bundled app)
# may be legally required to release their entire source under
# the copyleft license, even though they chose your project
# *because* it was permissively licensed.
#
# Even without copyleft, some licenses have incompatible clauses
# (e.g., advertising requirements, patent retaliation) that
# conflict with your project's license terms.  This workflow
# catches incompatible dependencies **before** they ship, so
# your users and downstream consumers are never surprised by
# license obligations they didn't expect.
#
# In short: one bad dependency can change the legal terms for
# every user of your project.  This check prevents that.
#
# Triggers:
#   - Pull requests targeting main (catch new deps early)
#   - Push to main
#   - Weekly schedule (Saturday 08:00 UTC; 4am ET during DST / 3am ET otherwise)
#   - Manual dispatch
#
# TODO (template users):
#   1. Enable the repository guard (pick ONE):
#        Option A – Replace 'YOURNAME/YOURREPO' below with
#                   your actual repo slug (e.g. 'myorg/myproject').
#        Option B – Set a repository variable (no YAML edits needed):
#                     vars.ENABLE_LICENSE_CHECK = 'true'
#                   (Settings → Secrets and variables → Actions → Variables)
#   2. Review and adjust the ALLOWED_LICENSES list below to match
#      your project's license compatibility requirements.
#   3. If your project uses GPL or another copyleft license, you
#      may want to expand the list significantly or invert the
#      logic to a deny-list instead.
# ──────────────────────────────────────────────────────────────

name: License Check

on:
  push:
    branches: [main]
    paths:
      - "pyproject.toml"
      - "requirements*.txt"
  pull_request:
    branches: [main]
    paths:
      - "pyproject.toml"
      - "requirements*.txt"
  schedule:
    # Cron is a Unix time-scheduling syntax and the only way to
    # define scheduled triggers in GitHub Actions. It uses five
    # fields (all in UTC):
    #
    #   ┌─── minute (0–59)
    #   │ ┌─── hour (0–23)
    #   │ │ ┌─── day of month (1–31)
    #   │ │ │ ┌─── month (1–12)
    #   │ │ │ │ ┌─── day of week (0=Sun … 6=Sat)
    #   │ │ │ │ │
    #   * * * * *
    #
    # Because cron is fixed to UTC, local time shifts with DST (Daylight Saving Time):
    #   08:00 UTC = 03:00 EST (Nov–Mar) / 04:00 EDT (Mar–Nov)
    - cron: "0 8 * * 6" # Saturday 08:00 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  license-check:
    name: Verify dependency licenses

    # ── Repository guard ──────────────────────────────────────
    # Prevents this workflow from running on forks or clones
    # that haven't opted in.
    #
    #   Option A  – Edit the hardcoded slug below.
    #   Option B  – Set vars.ENABLE_LICENSE_CHECK = 'true'.
    if: >-
      ${{
        github.repository == 'YOURNAME/YOURREPO'
        || vars.ENABLE_WORKFLOWS == 'true'
        || vars.ENABLE_LICENSE_CHECK == 'true'
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # Checkout a Git repository at a particular version (v6.0.2)
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # Set up a specific version of Python and add… (v6.2.0)
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install project and pip-licenses
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pip-licenses

      - name: List all dependency licenses
        run: pip-licenses --format=plain --with-urls --order=license

      - name: Check license compatibility
        run: |
          # ── Allowed licenses ───────────────────────────────
          # These are common permissive licenses compatible with
          # Apache 2.0.  Adjust this list for your project's needs.
          #
          # The --allow-only flag causes pip-licenses to exit 1
          # if ANY installed package uses a license not in this
          # semicolon-separated list.  pip-licenses uses exact
          # string matching against its own license classifier
          # database, so each entry must match precisely.
          #
          # TODO (template users): Review and adjust this list.
          #   - For GPL projects: add 'GNU General Public License v3 (GPLv3)'
          #   - For proprietary: you may want a stricter list
          #   - Run `pip-licenses --format=plain` to see what your
          #     current deps actually use, then allow those.
          pip-licenses --allow-only="\
          Apache Software License;\
          Apache License 2.0;\
          MIT License;\
          BSD License;\
          BSD 2-Clause License;\
          BSD 3-Clause License;\
          ISC License (ISCL);\
          ISC;\
          Python Software Foundation License;\
          Mozilla Public License 2.0 (MPL 2.0);\
          The Unlicense (Unlicense);\
          Public Domain;\
          Historical Permission Notice and Disclaimer (HPND);\
          license_check;\
          "

      - name: Write job summary
        if: always()
        run: |
          echo "## License Check" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          pip-licenses --format=plain --order=license >> "$GITHUB_STEP_SUMMARY" 2>&1 || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"
