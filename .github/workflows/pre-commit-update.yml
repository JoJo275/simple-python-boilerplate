# Runs `pre-commit autoupdate` weekly and opens a PR with bumped hook versions.
# This keeps .pre-commit-config.yaml up to date automatically.
#
# Uses a GitHub App token (same as release-please.yml) so the PR triggers
# pull_request events and CI checks run automatically. PRs created with
# GITHUB_TOKEN do NOT trigger other workflows (GitHub's anti-recursion
# safeguard).
#
# Required secrets:
#   - RELEASE_APP_ID      вЂ” the App ID (numeric)
#   - RELEASE_APP_PRIVATE_KEY вЂ” the PEM private key
#
# See: https://github.com/peter-evans/create-pull-request/blob/main/docs/concepts-guidelines.md#triggering-further-workflow-runs

name: Update pre-commit hooks

on:
  schedule:
    # Cron is a Unix time-scheduling syntax and the only way to
    # define scheduled triggers in GitHub Actions. It uses five
    # fields (all in UTC):
    #
    #   в”Њв”Ђв”Ђв”Ђ minute (0вЂ“59)
    #   в”‚ в”Њв”Ђв”Ђв”Ђ hour (0вЂ“23)
    #   в”‚ в”‚ в”Њв”Ђв”Ђв”Ђ day of month (1вЂ“31)
    #   в”‚ в”‚ в”‚ в”Њв”Ђв”Ђв”Ђ month (1вЂ“12)
    #   в”‚ в”‚ в”‚ в”‚ в”Њв”Ђв”Ђв”Ђ day of week (0=Sun вЂ¦ 6=Sat)
    #   в”‚ в”‚ в”‚ в”‚ в”‚
    #   * * * * *
    #
    # Because cron is fixed to UTC, local time shifts with DST (Daylight Saving Time):
    #   09:00 UTC = 04:00 EST (NovвЂ“Mar) / 05:00 EDT (MarвЂ“Nov)
    - cron: "0 9 * * 1"  # Every Monday at 09:00 UTC
  workflow_dispatch: # Manual trigger

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update:
    name: Auto-update hooks

    # в”Ђв”Ђ Repository guard в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
    # Prevents this workflow from running on forks or clones
    # that haven't opted in.
    #
    #   Option A  вЂ“ Edit the hardcoded slug below.
    #   Option B  вЂ“ Set vars.ENABLE_PRE_COMMIT_UPDATE = 'true'.
    if: >-
      ${{
        github.repository == 'YOURNAME/YOURREPO'
        || vars.ENABLE_WORKFLOWS == 'true'
        || vars.ENABLE_PRE_COMMIT_UPDATE == 'true'
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # Checkout a Git repository at a particular version (v6.0.2)
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # Set up a specific version of Python and addвЂ¦ (v6.2.0)
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install pre-commit
        run: python -m pip install --upgrade pip pre-commit

      - name: Run pre-commit autoupdate
        run: pre-commit autoupdate

      - name: Check for changes
        id: diff
        run: |
          git diff --exit-code .pre-commit-config.yaml && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      # в”Ђв”Ђ Generate App token в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      # PRs created with GITHUB_TOKEN don't trigger pull_request
      # events (GitHub's anti-recursion rule), so CI checks would
      # never run on the PR and the CI gate would stay pending.
      # A GitHub App installation token bypasses this limitation.
      # Uses the same App as release-please.yml.
      - name: Generate GitHub App token
        if: steps.diff.outputs.changed == 'true'
        id: app-token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # GitHub Action for creating a GitHub App Installation Access Token (v2.2.1)
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Create pull request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # Creates a pull request for changes to yourвЂ¦ (v8.1.0)
        with:
          token: ${{ steps.app-token.outputs.token }}
          branch: chore/pre-commit-autoupdate
          commit-message: "chore: update pre-commit hooks"
          title: "chore: update pre-commit hooks"
          body: |
            Automated update of pre-commit hook versions via `pre-commit autoupdate`.

            Review the diff to confirm the version bumps look correct, then merge.
          labels: dependencies
          delete-branch: true
